name: Generate RSS Feed

on:
  schedule:
    # Run every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  generate-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Build feed filter
        run: go build -o feed-filter

      - name: Save new articles
        env:
          FEED_URL: ${{ vars.FEED_URL }}
          ALLOWED_AUTHOR_LIST: ${{ vars.ALLOWED_AUTHOR_LIST }}
        run: ./feed-filter --feed "$FEED_URL" --authors --save-to articles/

      - name: Commit new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git diff --staged --quiet || git commit -m "Add new articles [skip ci]"
          git push

      - name: Generate RSS feed
        run: ./feed-filter --build-from articles/ --format rss > filtered-feed.xml

      - name: Create or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Filtered RSS Feed
          body: |
            Automatically generated filtered RSS feed
            Generated on: ${{ github.run_id }}
            Last updated: ${{ github.event.repository.updated_at }}
          files: filtered-feed.xml
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
